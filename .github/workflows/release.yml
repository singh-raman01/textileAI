name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # ── Backend: bundle with PyInstaller ─────────────────────────────────────
      - name: Install Python dependencies + PyInstaller
        working-directory: backend
        run: uv sync --extra ml --extra ocr && uv pip install pyinstaller

      - name: Build Python sidecar
        working-directory: backend
        run: |
          uv run pyinstaller main.py `
            --name textile-search-backend `
            --onedir `
            --noconfirm `
            --add-data "migrations;migrations" `
            --add-data "alembic.ini;." `
            --hidden-import alembic.config `
            --hidden-import alembic.command `
            --hidden-import alembic.script `
            --hidden-import alembic.runtime.migration

      - name: Stage backend bundle
        run: |
          New-Item -ItemType Directory -Force -Path backend-dist
          Copy-Item -Recurse backend\dist\textile-search-backend\* backend-dist\

      # ── Frontend: build Electron installer ───────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload to GitHub Release ──────────────────────────────────────────────
      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          body: |
            ## TextileSearch ${{ github.ref_name }}

            **Download size: ~1.3 GB** — includes all AI models (FashionCLIP + PaddleOCR).
            No internet connection required after installation.

            ### Installation
            1. Download `TextileSearch-Setup-*.exe`
            2. Run the installer (Windows may show a SmartScreen warning — click "More info" → "Run anyway")
            3. Launch TextileSearch from the Start menu
