[mypy]
python_version = 3.12
strict = True

# Errors on any implicit Any
disallow_any_generics = True
disallow_any_unimported = True
warn_return_any = True

# All functions must be annotated
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_decorators = True

# No implicit Optional
no_implicit_optional = True

# Warn on dead code and unused config
warn_unreachable = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_no_return = True

# SQLAlchemy plugin handles ORM types
plugins = sqlalchemy.ext.mypy.plugin

# Third-party libraries without stubs — silence their errors
[mypy-faiss.*]
ignore_missing_imports = True

[mypy-paddle.*]
ignore_missing_imports = True

[mypy-paddleocr.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-pythonjsonlogger.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True
